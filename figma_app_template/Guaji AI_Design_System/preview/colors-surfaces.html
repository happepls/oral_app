<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Lexend', sans-serif; background: #f6f7f8; padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip { border-radius: 10px; padding: 12px 14px; width: 130px; border: 1px solid rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 4px; }
  .chip-name { font-size: 11px; font-weight: 600; color: #374151; }
  .chip-val { font-size: 10px; color: #9CA3AF; }
  .dot { width: 24px; height: 24px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08); margin-bottom: 6px; }
</style>
</head>
<body>
<div class="row">
  <div class="chip" style="background:#fff;">
    <div class="dot" style="background:#f6f7f8; border:1px solid #e5e7eb;"></div>
    <div class="chip-name">BG Light</div><div class="chip-val">#f6f7f8</div>
  </div>
  <div class="chip" style="background:#fff;">
    <div class="dot" style="background:#101922;"></div>
    <div class="chip-name">BG Dark</div><div class="chip-val">#101922</div>
  </div>
  <div class="chip" style="background:#fff;">
    <div class="dot" style="background:#ffffff; border:1px solid #e5e7eb;"></div>
    <div class="chip-name">Card</div><div class="chip-val">#ffffff</div>
  </div>
  <div class="chip" style="background:#fff;">
    <div class="dot" style="background:#ececf0;"></div>
    <div class="chip-name">Muted</div><div class="chip-val">#ececf0</div>
  </div>
  <div class="chip" style="background:#fff;">
    <div class="dot" style="background:#1a1a1a;"></div>
    <div class="chip-name">Foreground</div><div class="chip-val">#1a1a1a</div>
  </div>
  <div class="chip" style="background:#fff;">
    <div class="dot" style="background:#6B7280;"></div>
    <div class="chip-name">Muted FG</div><div class="chip-val">#6B7280</div>
  </div>
  <div class="chip" style="background:#fff;">
    <div class="dot" style="background:#9CA3AF;"></div>
    <div class="chip-name">Subtle FG</div><div class="chip-val">#9CA3AF</div>
  </div>
  <div class="chip" style="background:#fff;">
    <div class="dot" style="background:#E5E7EB;"></div>
    <div class="chip-name">Border</div><div class="chip-val">#E5E7EB</div>
  </div>
</div>
</body>
</html>
