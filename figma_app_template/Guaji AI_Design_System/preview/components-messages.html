<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Lexend', sans-serif; background: #f6f7f8; padding: 20px; }
  .chat { display: flex; flex-direction: column; gap: 14px; max-width: 500px; }
  .msg { display: flex; gap: 10px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
  .bubble { padding: 12px 18px; max-width: 70%; font-size: 14px; line-height: 1.5; }
  .bubble.ai { background: #E1E2E6; color: #1F2937; border-radius: 8px 20px 20px 20px; }
  .bubble.user { background: #637FF1; color: #fff; border-radius: 20px 20px 8px 20px; }
  .bubble.loading { display: flex; gap: 4px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #9CA3AF; animation: pulse 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
  .ts { font-size: 11px; color: #9CA3AF; margin-top: 4px; padding: 0 4px; }
  .translate { background: #F3F4F6; border-radius: 12px; padding: 8px 14px; margin-top: 6px; font-size: 12px; color: #6B7280; max-width: 70%; }
</style>
</head>
<body>
<div class="chat">
  <div class="msg">
    <div class="avatar" style="background:#a47af6;color:#fff;">AI</div>
    <div>
      <div class="bubble ai">Hi! Let's practice ordering at a coffee shop. What would you like to order today?</div>
      <div class="translate">🌐 你好！我们来练习在咖啡馆点餐。今天你想点什么？</div>
      <div class="ts">14:23</div>
    </div>
  </div>
  <div class="msg user">
    <div class="avatar" style="background:linear-gradient(135deg,#637FF1,#a47af6);color:#fff;">L</div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;">
      <div class="bubble user">I'd like a medium latte, please. Can I also get a blueberry muffin?</div>
      <div class="ts">14:24</div>
    </div>
  </div>
  <div class="msg">
    <div class="avatar" style="background:#a47af6;color:#fff;">AI</div>
    <div>
      <div class="bubble loading">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
