<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Lexend', sans-serif; background: #f6f7f8; padding: 20px; }
  .row { display: flex; gap: 16px; align-items: stretch; }
  .panel { border-radius: 16px; padding: 20px; flex: 1; }
  /* Logotype */
  .logotype { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, #9B7FD4, #7B5EBF); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; font-weight: 700; box-shadow: 0 10px 23px rgba(155,127,212,0.3); }
  .logo-text { font-size: 22px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.01em; }
  .logo-text span { background: linear-gradient(135deg, #9B7FD4, #7B5EBF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .tagline { font-size: 12px; color: #9CA3AF; margin-top: 4px; }
  /* Avatar */
  .avatar-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; }
  /* Gradient samples */
  .grad-row { display: flex; gap: 8px; margin-top: 10px; }
  .grad { height: 40px; border-radius: 10px; flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; }
</style>
</head>
<body>
<div class="row">
  <div class="panel" style="background:#fff;">
    <div style="font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;">Brand Mark</div>
    <div class="logotype">
      <div class="logo-icon">G</div>
      <div>
        <div class="logo-text"><span>Guaji</span> AI</div>
        <div class="tagline">24/7 AI Speaking Coach</div>
      </div>
    </div>
    <div style="margin-top:16px;font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Avatars</div>
    <div class="avatar-row">
      <div class="avatar" style="width:36px;height:36px;background:linear-gradient(135deg,#9B7FD4,#7B5EBF);font-size:14px;">A</div>
      <div class="avatar" style="width:44px;height:44px;background:linear-gradient(135deg,#9B7FD4,#7B5EBF);font-size:18px;">李</div>
      <div class="avatar" style="width:52px;height:52px;background:#7B5EBF;font-size:22px;">🤖</div>
    </div>
  </div>
  <div class="panel" style="background:#fff;">
    <div style="font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;">Gradients</div>
    <div class="grad-row">
      <div class="grad" style="background:linear-gradient(135deg,#9B7FD4,#7B5EBF);">Brand</div>
      <div class="grad" style="background:linear-gradient(135deg,#F6B443,#F97316);">Warm / Pro</div>
      <div class="grad" style="background:linear-gradient(to bottom right,#F3EDFF,#F5F3FF);color:#9B7FD4;">Scenario BG</div>
    </div>
    <div style="margin-top:14px;font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Dark Surface</div>
    <div style="background:#101922;border-radius:12px;padding:14px;display:flex;align-items:center;gap:10px;">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#9B7FD4,#7B5EBF);"></div>
      <div>
        <div style="font-size:13px;font-weight:600;color:#F8FAFC;">Dark mode card</div>
        <div style="font-size:11px;color:#64748B;">#101922 background</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
