<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Lexend', sans-serif; background: #f6f7f8; padding: 20px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
  .box { background: #637FF1; opacity: 0.85; }
  .label { font-size: 11px; font-weight: 600; color: #374151; }
  .value { font-size: 10px; color: #9CA3AF; }
  .usage { font-size: 10px; color: #9CA3AF; text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div class="item">
    <div class="box" style="width:60px;height:60px;border-radius:10px;"></div>
    <div class="label">SM</div><div class="value">10px</div>
    <div class="usage">Chips, tags</div>
  </div>
  <div class="item">
    <div class="box" style="width:60px;height:60px;border-radius:13px;"></div>
    <div class="label">MD</div><div class="value">13px</div>
    <div class="usage">Inputs, cards</div>
  </div>
  <div class="item">
    <div class="box" style="width:60px;height:60px;border-radius:20px;"></div>
    <div class="label">LG</div><div class="value">20px</div>
    <div class="usage">Scenario cards</div>
  </div>
  <div class="item">
    <div class="box" style="width:60px;height:60px;border-radius:29px;"></div>
    <div class="label">XL</div><div class="value">29px</div>
    <div class="usage">Modals</div>
  </div>
  <div class="item">
    <div class="box" style="width:60px;height:60px;border-radius:9999px;"></div>
    <div class="label">Full</div><div class="value">9999px</div>
    <div class="usage">Pills, FAB, avatar</div>
  </div>
</div>
</body>
</html>
