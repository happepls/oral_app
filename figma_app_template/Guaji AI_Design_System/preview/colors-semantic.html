<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Lexend', sans-serif; background: #f6f7f8; padding: 20px; }
  .row { display: flex; gap: 12px; }
  .swatch { border-radius: 14px; padding: 14px 18px; flex: 1; min-height: 80px; display: flex; flex-direction: column; justify-content: flex-end; }
  .swatch-label { font-size: 11px; font-weight: 600; opacity: 0.85; margin-bottom: 2px; }
  .swatch-hex { font-size: 12px; opacity: 0.7; }
  .tint { border-radius: 10px; padding: 10px 14px; flex: 1; display: flex; flex-direction: column; justify-content: center; border: 1px solid rgba(0,0,0,0.08); }
  .tint-label { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
  .tint-hex { font-size: 11px; opacity: 0.6; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:#10B981; color:#fff;">
    <div class="swatch-label">Success</div>
    <div class="swatch-hex">#10B981</div>
  </div>
  <div class="tint" style="background:#D1FAE5;">
    <div class="tint-label" style="color:#065F46;">Success Tint</div>
    <div class="tint-hex" style="color:#065F46;">#D1FAE5</div>
  </div>
  <div class="swatch" style="background:#F59E0B; color:#fff;">
    <div class="swatch-label">Warning</div>
    <div class="swatch-hex">#F59E0B</div>
  </div>
  <div class="tint" style="background:#FEF3C7;">
    <div class="tint-label" style="color:#92400E;">Warning Tint</div>
    <div class="tint-hex" style="color:#92400E;">#FEF3C7</div>
  </div>
  <div class="swatch" style="background:#e2412e; color:#fff;">
    <div class="swatch-label">Error</div>
    <div class="swatch-hex">#e2412e</div>
  </div>
  <div class="tint" style="background:#FEE2E2;">
    <div class="tint-label" style="color:#991B1B;">Error Tint</div>
    <div class="tint-hex" style="color:#991B1B;">#FEE2E2</div>
  </div>
</div>
</body>
</html>
