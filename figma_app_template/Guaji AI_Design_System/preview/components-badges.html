<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Lexend', sans-serif; background: #f6f7f8; padding: 20px; }
  .section { margin-bottom: 16px; }
  .section-label { font-size: 10px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
  .chip { display: inline-flex; align-items: center; padding: 5px 14px; border-radius: 9999px; font-size: 12px; font-weight: 500; cursor: pointer; }
  .chip.active { background: #637FF1; color: #fff; }
  .chip.inactive { background: #F3F4F6; color: #6B7280; }
  .pro-badge { background: #FEF3C7; color: #92400E; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 9999px; }
</style>
</head>
<body>
  <div class="section">
    <div class="section-label">Difficulty Badges</div>
    <div class="row">
      <span class="badge" style="background:#10B981;color:#fff;">初级</span>
      <span class="badge" style="background:#F6B443;color:#fff;">中级</span>
      <span class="badge" style="background:#FB7250;color:#fff;">高级</span>
    </div>
  </div>
  <div class="section">
    <div class="section-label">Status Badges</div>
    <div class="row">
      <span class="badge" style="background:#D1FAE5;color:#065F46;">✅ 优秀</span>
      <span class="badge" style="background:#c3cef8;color:#2d44ca;">良好</span>
      <span class="badge" style="background:#F3F4F6;color:#9CA3AF;">继续加油</span>
      <span class="pro-badge">Pro</span>
      <span class="badge" style="background:#FEF3C7;color:#92400E;">👑 Premium</span>
    </div>
  </div>
  <div class="section">
    <div class="section-label">Filter Chips</div>
    <div class="row">
      <span class="chip active">全部</span>
      <span class="chip inactive">进行中</span>
      <span class="chip inactive">已完成</span>
      <span class="chip inactive">未开始</span>
    </div>
  </div>
</body>
</html>
