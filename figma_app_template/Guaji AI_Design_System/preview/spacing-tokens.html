<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Lexend', sans-serif; background: #fff; padding: 20px 24px; }
  .rows { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .bar-wrap { flex: 1; height: 20px; background: #f3f4f6; border-radius: 6px; overflow: hidden; }
  .bar { height: 100%; background: linear-gradient(90deg, #637FF1, #a47af6); border-radius: 6px; }
  .val { font-size: 12px; color: #6B7280; width: 36px; text-align: right; flex-shrink: 0; }
  .name { font-size: 12px; font-weight: 600; color: #1a1a1a; width: 60px; flex-shrink: 0; }
  .px { font-size: 11px; color: #9CA3AF; width: 30px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="rows">
  <div class="row"><div class="name">space-1</div><div class="bar-wrap"><div class="bar" style="width:6.25%"></div></div><div class="val">4px</div></div>
  <div class="row"><div class="name">space-2</div><div class="bar-wrap"><div class="bar" style="width:12.5%"></div></div><div class="val">8px</div></div>
  <div class="row"><div class="name">space-3</div><div class="bar-wrap"><div class="bar" style="width:18.75%"></div></div><div class="val">12px</div></div>
  <div class="row"><div class="name">space-4</div><div class="bar-wrap"><div class="bar" style="width:25%"></div></div><div class="val">16px</div></div>
  <div class="row"><div class="name">space-6</div><div class="bar-wrap"><div class="bar" style="width:37.5%"></div></div><div class="val">24px</div></div>
  <div class="row"><div class="name">space-8</div><div class="bar-wrap"><div class="bar" style="width:50%"></div></div><div class="val">32px</div></div>
  <div class="row"><div class="name">space-12</div><div class="bar-wrap"><div class="bar" style="width:75%"></div></div><div class="val">48px</div></div>
  <div class="row"><div class="name">space-16</div><div class="bar-wrap"><div class="bar" style="width:100%"></div></div><div class="val">64px</div></div>
</div>
</body>
</html>
