# Staging Docker Compose Configuration
# This file defines the staging deployment configuration

version: '3.8'

services:
  api-gateway:
    image: ghcr.io/sjx1943/oral_app/api-gateway:develop
    container_name: oral_app_api_gateway_staging
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - client-app
      - user-service
      - comms-service
      - ai-omni-service
      - conversation-service
      - history-analytics-service
    networks:
      - oral_app_net
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80

  history-analytics-service:
    image: ghcr.io/sjx1943/oral_app/history-analytics-service:develop
    container_name: oral_app_history_analytics_service_staging
    restart: always
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGO_URI=mongodb://root:${MONGO_PASSWORD}@mongo:27017/oral_app_history?authSource=admin
      - NODE_ENV=staging
    depends_on:
      - mongo
    networks:
      - oral_app_net

  client-app:
    image: ghcr.io/sjx1943/oral_app/client:develop
    container_name: oral_app_client_app_staging
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - REACT_APP_API_URL=/api
      - NODE_ENV=staging
    networks:
      - oral_app_net

  postgres:
    image: postgres:14-alpine
    container_name: oral_app_postgres_staging
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=oral_app_staging
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS="--encoding=UTF-8"
    volumes:
      - ./services/user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data_staging:/var/lib/postgresql/data
    networks:
      - oral_app_net
    command: -c shared_buffers=128MB -c max_connections=100

  mongo:
    image: mongo:6.0
    container_name: oral_app_mongo_staging
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_staging:/data/db
    networks:
      - oral_app_net

  redis:
    image: redis:7-alpine
    container_name: oral_app_redis_staging
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - oral_app_net

  user-service:
    image: ghcr.io/sjx1943/oral_app/user-service:develop
    container_name: oral_app_user_service_staging
    restart: always
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_USER=user
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DATABASE=oral_app_staging
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=staging
      - DATABASE_SSL=false
    depends_on:
      - postgres
    networks:
      - oral_app_net

  comms-service:
    image: ghcr.io/sjx1943/oral_app/comms-service:develop
    container_name: oral_app_comms_service_staging
    restart: always
    ports:
      - "3001:8080"
    environment:
      - PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_WS_URL=ws://ai-omni-service:8008/stream
      - NODE_ENV=staging
    depends_on:
      - redis
    networks:
      - oral_app_net

  ai-omni-service:
    image: ghcr.io/sjx1943/oral_app/ai-omni-service:develop
    container_name: oral_app_ai_omni_service_staging
    restart: always
    ports:
      - "8082:8082"
      - "8081:8081"
    environment:
      - QWEN3_OMNI_MODEL=qwen3.5-omni-plus-realtime
      - USER_SERVICE_URL=http://user-service:3000
      - CONVERSATION_SERVICE_URL=http://conversation-service:8083
      - MEDIA_SERVICE_URL=http://media-processing-service:3005
      - NODE_ENV=staging
    networks:
      - oral_app_net

  conversation-service:
    image: ghcr.io/sjx1943/oral_app/conversation-service:develop
    container_name: oral_app_conversation_service_staging
    restart: always
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_USER=user
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DATABASE=oral_app_staging
      - DB_PORT=5432
      - NODE_ENV=staging
    depends_on:
      - redis
      - postgres
    networks:
      - oral_app_net

  media-processing-service:
    image: ghcr.io/sjx1943/oral_app/media-processing-service:develop
    container_name: oral_app_media_processing_service_staging
    restart: always
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - NODE_ENV=staging
    networks:
      - oral_app_net

volumes:
  postgres_data_staging:
  mongo_data_staging:

networks:
  oral_app_net:
    driver: bridge