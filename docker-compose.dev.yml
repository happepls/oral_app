# Development Docker Compose Configuration
# This file defines the development environment configuration

version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
    container_name: oral_app_api_gateway_dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - client-app
      - user-service
      - comms-service
      - ai-omni-service
      - conversation-service
      - history-analytics-service
    networks:
      - oral_app_net

  history-analytics-service:
    build: ./services/history-analytics-service
    container_name: oral_app_history_analytics_service_dev
    restart: always
    ports:
      - "3004:3004"
    volumes:
      - ./services/history-analytics-service/src:/app/src
    environment:
      - PORT=3004
      - MONGO_URI=mongodb://root:${MONGO_PASSWORD}@mongo:27017/oral_app_history?authSource=admin
      - NODE_ENV=development
    depends_on:
      - mongo
    networks:
      - oral_app_net

  client-app:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: oral_app_client_app_dev
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
      - /app/node_modules  # Prevents overriding node_modules in container
    environment:
      - REACT_APP_API_URL=/api
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    networks:
      - oral_app_net

  postgres:
    image: postgres:14-alpine
    container_name: oral_app_postgres_dev
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=oral_app_dev
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS="--encoding=UTF-8"
    volumes:
      - ./services/user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - oral_app_net
    command: -c log_statement=all -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

  mongo:
    image: mongo:6.0
    container_name: oral_app_mongo_dev
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    networks:
      - oral_app_net

  redis:
    image: redis:7-alpine
    container_name: oral_app_redis_dev
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --loglevel verbose
    networks:
      - oral_app_net

  user-service:
    build: ./services/user-service
    container_name: oral_app_user_service_dev
    restart: always
    ports:
      - "3002:3000"
    volumes:
      - ./services/user-service/src:/usr/src/app/src
      - /usr/src/app/node_modules  # Prevents overriding node_modules in container
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_USER=user
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DATABASE=oral_app_dev
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=development
      - DATABASE_SSL=false
    depends_on:
      - postgres
    networks:
      - oral_app_net

  comms-service:
    build: ./services/comms-service
    container_name: oral_app_comms_service_dev
    restart: always
    ports:
      - "3001:8080"
    volumes:
      - ./services/comms-service/src:/usr/src/app/src
      - /usr/src/app/node_modules  # Prevents overriding node_modules in container
    environment:
      - PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_WS_URL=ws://ai-omni-service:8008/stream
      - NODE_ENV=development
    depends_on:
      - redis
    networks:
      - oral_app_net

  ai-omni-service:
    build: ./services/ai-omni-service
    container_name: oral_app_ai_omni_service_dev
    restart: always
    ports:
      - "8082:8082"
      - "8081:8081"
    volumes:
      - ./services/ai-omni-service/models:/usr/src/app/models
      - ./services/ai-omni-service/.env:/app/.env
      - ./services/ai-omni-service/app:/app/app
    environment:
      - QWEN3_OMNI_MODEL=qwen3.5-omni-plus-realtime
      - USER_SERVICE_URL=http://user-service:3000
      - CONVERSATION_SERVICE_URL=http://conversation-service:8083
      - MEDIA_SERVICE_URL=http://media-processing-service:3005
      - NODE_ENV=development
    networks:
      - oral_app_net

  conversation-service:
    build: ./services/conversation-service
    container_name: oral_app_conversation_service_dev
    restart: always
    ports:
      - "8083:8083"
    volumes:
      - ./services/conversation-service/src:/usr/src/app/src
      - /usr/src/app/node_modules  # Prevents overriding node_modules in container
    environment:
      - PORT=8083
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_USER=user
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DATABASE=oral_app_dev
      - DB_PORT=5432
      - NODE_ENV=development
    depends_on:
      - redis
      - postgres
    networks:
      - oral_app_net

  media-processing-service:
    build: ./services/media-processing-service
    container_name: oral_app_media_processing_service_dev
    restart: always
    ports:
      - "3005:3005"
    volumes:
      - ./services/media-processing-service/src:/app/src
      - /app/node_modules  # Prevents overriding node_modules in container
    environment:
      - PORT=3005
      - NODE_ENV=development
    networks:
      - oral_app_net

volumes:
  postgres_data_dev:
  mongo_data_dev:

networks:
  oral_app_net:
    driver: bridge