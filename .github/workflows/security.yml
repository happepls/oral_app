name: Security Scan

on:
  push:
    branches: [ master, main, develop ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly security scans
  workflow_dispatch:       # allow manual runs (verify config without waiting for schedule)

# Least-privilege token; upload-sarif needs security-events: write to push
# results to the Security tab (default token is read-only → "Resource not
# accessible by integration"). CodeQL also needs actions: read.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ---------------------------------------------------------------------------
  # Trivy filesystem scan — dependency / IaC / secret findings → Security tab.
  # ---------------------------------------------------------------------------
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          # Report only — do not fail the whole security workflow on findings;
          # the SARIF upload surfaces them in the Security tab instead.
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ---------------------------------------------------------------------------
  # CodeQL static analysis for JavaScript/TypeScript. Requires the full
  # init → (autobuild) → analyze sequence; analyze alone always fails.
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
