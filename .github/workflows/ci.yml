name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          client/package-lock.json
          services/*/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Install client dependencies
      run: |
        cd client
        npm ci

    - name: Install service dependencies
      run: |
        cd services/user-service
        npm ci
        cd ../comms-service
        npm ci
        cd ../ai-omni-service
        npm ci
        cd ../history-analytics-service
        npm ci
        cd ../conversation-service
        npm ci
        cd ../media-processing-service
        npm ci

    - name: Run linting
      run: |
        npm run lint || echo "Linting issues found, please fix them"
        cd client && npm run lint || echo "Client linting issues found, please fix them"

    - name: Run unit tests
      run: |
        npm test
        cd client && npm test -- --passWithNoTests

    - name: Run integration tests
      run: |
        cd integration_tests
        python -m unittest discover -v