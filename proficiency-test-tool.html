<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proficiency Test Tool</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; }
        .success { background-color: #4CAF50; color: white; }
        .warning { background-color: #ff9800; color: white; }
        .danger { background-color: #f44336; color: white; }
        .info { background-color: #2196F3; color: white; }
        pre { background-color: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .metric { margin: 10px 0; padding: 10px; background-color: #f9f9f9; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Proficiency Test Tool</h1>
        
        <div class="section">
            <h2>LocalStorage Management</h2>
            <button onclick="clearLocalStorage()" class="danger">Clear All Proficiency Data</button>
            <button onclick="showLocalStorage()" class="info">Show Current Data</button>
            <button onclick="setTestData()" class="warning">Set Test Data</button>
            <div id="localStorageDisplay"></div>
        </div>
        
        <div class="section">
            <h2>API Testing</h2>
            <button onclick="testGetProficiency()" class="info">Test GET Proficiency</button>
            <button onclick="testSaveProficiency()" class="success">Test SAVE Proficiency</button>
            <div id="apiResults"></div>
        </div>
        
        <div class="section">
            <h2>Simulate User Data</h2>
            <button onclick="simulateUserProgress()" class="warning">Simulate Progress</button>
            <div id="simulationResults"></div>
        </div>
    </div>

    <script>
        const PROFICIENCY_KEY = 'oral_app_proficiency_metrics';
        const SYNC_KEY = 'oral_app_backend_sync';
        const API_BASE_URL = 'http://localhost:8080/api';
        
        // Test user ID
        const TEST_USER_ID = 'test-user-5';
        
        function clearLocalStorage() {
            localStorage.removeItem(PROFICIENCY_KEY);
            localStorage.removeItem(SYNC_KEY);
            showLocalStorage();
            document.getElementById('localStorageDisplay').innerHTML = '<p style="color: green;">✅ LocalStorage cleared!</p>';
        }
        
        function showLocalStorage() {
            const data = localStorage.getItem(PROFICIENCY_KEY);
            const syncData = localStorage.getItem(SYNC_KEY);
            
            let html = '<h3>Current LocalStorage Data:</h3>';
            
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    html += '<div class="metric">';
                    html += `<strong>Proficiency Metrics:</strong><br>`;
                    html += `Accuracy: ${Math.round(parsed.language_accuracy * 100)}%<br>`;
                    html += `Complexity: ${Math.round(parsed.complexity_score * 100)}%<br>`;
                    html += `Engagement: ${parsed.engagement_level}<br>`;
                    html += `Interactions: ${parsed.total_interactions}<br>`;
                    html += `Last Updated: ${new Date(parsed.last_updated).toLocaleString()}<br>`;
                    html += '</div>';
                } catch (e) {
                    html += `<pre>${data}</pre>`;
                }
            } else {
                html += '<p>No proficiency data found in localStorage</p>';
            }
            
            if (syncData) {
                html += `<p><strong>Last Backend Sync:</strong> ${new Date(parseInt(syncData)).toLocaleString()}</p>`;
            } else {
                html += '<p>No sync timestamp found</p>';
            }
            
            document.getElementById('localStorageDisplay').innerHTML = html;
        }
        
        function setTestData() {
            const testData = {
                language_accuracy: 0.75,
                complexity_score: 0.68,
                engagement_level: 'high',
                improvement_suggestions: ['Great progress!', 'Keep practicing'],
                total_interactions: 25,
                cumulative_accuracy: 18.75,
                cumulative_complexity: 17.0,
                last_updated: Date.now()
            };
            
            localStorage.setItem(PROFICIENCY_KEY, JSON.stringify(testData));
            localStorage.setItem(SYNC_KEY, (Date.now() - 60000).toString()); // 1 minute ago
            
            showLocalStorage();
            document.getElementById('localStorageDisplay').innerHTML += '<p style="color: green;">✅ Test data set!</p>';
        }
        
        async function testGetProficiency() {
            try {
                const response = await fetch(`${API_BASE_URL}/history/proficiency/${TEST_USER_ID}`);
                const data = await response.json();
                
                let html = '<h3>GET Proficiency Results:</h3>';
                if (data.success) {
                    html += '<div class="metric">';
                    html += `<strong>Backend Data:</strong><br>`;
                    html += `Accuracy: ${Math.round(data.data.language_accuracy * 100)}%<br>`;
                    html += `Complexity: ${Math.round(data.data.complexity_score * 100)}%<br>`;
                    html += `Engagement: ${data.data.engagement_level}<br>`;
                    html += `Interactions: ${data.data.total_interactions}<br>`;
                    html += `Last Updated: ${new Date(data.data.last_updated).toLocaleString()}<br>`;
                    html += '</div>';
                } else {
                    html += `<p style="color: red;">Error: ${data.message}</p>`;
                }
                
                document.getElementById('apiResults').innerHTML = html;
            } catch (error) {
                document.getElementById('apiResults').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        async function testSaveProficiency() {
            const testMetrics = {
                language_accuracy: 0.82,
                complexity_score: 0.71,
                engagement_level: 'high',
                total_interactions: 30,
                cumulative_accuracy: 24.6,
                cumulative_complexity: 21.3
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/history/proficiency/${TEST_USER_ID}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testMetrics)
                });
                
                const data = await response.json();
                
                let html = '<h3>SAVE Proficiency Results:</h3>';
                if (data.success) {
                    html += '<p style="color: green;">✅ Successfully saved proficiency metrics!</p>';
                    html += '<div class="metric">';
                    html += `<strong>Saved Data:</strong><br>`;
                    html += `Accuracy: ${Math.round(data.data.language_accuracy * 100)}%<br>`;
                    html += `Complexity: ${Math.round(data.data.complexity_score * 100)}%<br>`;
                    html += `Engagement: ${data.data.engagement_level}<br>`;
                    html += `Interactions: ${data.data.total_interactions}<br>`;
                    html += '</div>';
                } else {
                    html += `<p style="color: red;">Error: ${data.message}</p>`;
                }
                
                document.getElementById('apiResults').innerHTML = html;
            } catch (error) {
                document.getElementById('apiResults').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        function simulateUserProgress() {
            const steps = [
                { accuracy: 0.65, complexity: 0.55, interactions: 5 },
                { accuracy: 0.72, complexity: 0.61, interactions: 10 },
                { accuracy: 0.78, complexity: 0.68, interactions: 15 },
                { accuracy: 0.82, complexity: 0.73, interactions: 20 }
            ];
            
            let html = '<h3>Simulated Progress:</h3>';
            
            steps.forEach((step, index) => {
                const metrics = {
                    language_accuracy: step.accuracy,
                    complexity_score: step.complexity,
                    engagement_level: index > 2 ? 'high' : 'normal',
                    improvement_suggestions: [`Step ${index + 1} suggestion`],
                    total_interactions: step.interactions,
                    cumulative_accuracy: step.accuracy * step.interactions,
                    cumulative_complexity: step.complexity * step.interactions,
                    last_updated: Date.now() + index * 1000
                };
                
                localStorage.setItem(PROFICIENCY_KEY, JSON.stringify(metrics));
                
                html += `<div class="metric">`;
                html += `<strong>Step ${index + 1}:</strong><br>`;
                html += `Accuracy: ${Math.round(step.accuracy * 100)}%<br>`;
                html += `Complexity: ${Math.round(step.complexity * 100)}%<br>`;
                html += `Interactions: ${step.interactions}<br>`;
                html += `</div>`;
            });
            
            document.getElementById('simulationResults').innerHTML = html;
            showLocalStorage();
        }
        
        // Initialize display
        showLocalStorage();
    </script>
</body>
</html>
