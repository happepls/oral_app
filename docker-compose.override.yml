# Development override for client-app
# This mounts the local build folder to avoid rebuilding the image

services:
  client-app:
    image: oral_app-client-app:latest
    volumes:
      - ./client/build:/usr/share/nginx/html:ro
      # The image (Dockerfile.prod) bakes in client.nginx.zeabur.conf for Zeabur's
      # private network (.zeabur.internal + resolver 10.43.0.20). Locally that DNS
      # is unreachable, so bind-mount the docker-network config back over it —
      # same pattern as api-gateway's nginx.conf bind-mount.
      - ./client/client.nginx.conf:/etc/nginx/nginx.conf:ro
