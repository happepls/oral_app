# Nginx configuration for Oral AI API Gateway
# This configuration handles routing for all microservices

# Worker processes and connections
worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Zeabur 私有网络 CoreDNS — 运行时动态解析 .zeabur.internal
    # `.zeabur.internal` hostnames are resolved at request time (not at startup)
    # via this resolver + variable-based proxy_pass below. This tolerates
    # backends being temporarily unreachable and does not block nginx startup,
    # avoiding the `[emerg] host not found in upstream` crash on rolling deploys.
    resolver 10.43.0.20 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Logging Configuration [MONITORING]
    log_format main_ext '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      '"$host" sn="$server_name" '
                      'rt=$request_time '
                      'ua="$upstream_addr" us="$upstream_status" '
                      'ut="$upstream_response_time" ul="$upstream_response_length" '
                      'cs=$upstream_cache_status' ;

    access_log  /var/log/nginx/access.log  main_ext;
    error_log  /var/log/nginx/error.log warn;

    # Dynamic CORS origin (required for credentials: 'include')
    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost:3000$" $http_origin;
        "~^https?://localhost:5001$" $http_origin;
        "~^https://guajiguaji\.top$" $http_origin;
        "~^https://www\.guajiguaji\.top$" $http_origin;
    }

    # Global CORS settings
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

    # Security Headers [SECURITY]
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Rate Limiting Zone [SECURITY]
    # Limit to 100 requests per second per IP for API endpoints (increased for app usage)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # Auth rate limit: 5 requests per minute per IP for login/register
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Buffer settings
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;

    # Proxy settings
    # Buffers sized for upstream services that return large response headers,
    # e.g. Stripe `/v1/products` proxying through user-service can carry many
    # Set-Cookie / Cache-Control / Stripe-* headers that overflow the default
    # 4k buffer and trigger `upstream sent too big header`.
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    proxy_connect_timeout 30;
    proxy_read_timeout 60;
    proxy_send_timeout 60;

    # Default-server catch-all: drop requests that don't match known hosts.
    # Cloudflare-only origin — direct-IP scans / forged Host headers hit this
    # block and get 444 (close connection, no response). Only ONE listen 80
    # may be default_server per port; the real server block below intentionally
    # has NO default_server flag so unmatched Host routes here, matched Host
    # (guajiguaji.top/www/localhost) routes to the real block.
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    # Server block for API gateway
    server {
        listen 80;
        server_name guajiguaji.top www.guajiguaji.top localhost;

        # Backend addresses as variables — forces per-request DNS resolution
        # through the http{} `resolver` above (instead of static startup lookup).
        set $svc_user        user-service.zeabur.internal:3000;
        set $svc_comms       comms-service.zeabur.internal:8080;
        set $svc_aiomni      ai-omni-service.zeabur.internal:8082;
        set $svc_conv        conversation-service.zeabur.internal:8083;
        set $svc_history     history-analytics-service.zeabur.internal:3004;
        set $svc_media       media-processing-service.zeabur.internal:3005;
        set $svc_client      client-app.zeabur.internal:5001;

        # WebSocket support for Communications Service
        location /api/ws {
            # Static version used `proxy_pass http://comms_service/;` (trailing /)
            # to strip the /api/ws prefix. Variable proxy_pass ignores the URI part,
            # so reproduce the strip with an explicit rewrite.
            rewrite ^/api/ws(.*)$ /$1 break;
            proxy_pass http://$svc_comms;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Additional WebSocket-specific headers
            proxy_buffering off;
            proxy_cache off;
            # Add CORS headers for WebSocket
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Sec-WebSocket-Key,Sec-WebSocket-Version' always;
        }

        # Alternative WebSocket location with trailing slash (for compatibility)
        location /api/ws/ {
            # Strip /api/ws/ prefix (was trailing-slash proxy_pass in static conf).
            rewrite ^/api/ws/(.*)$ /$1 break;
            proxy_pass http://$svc_comms;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Additional WebSocket-specific headers
            proxy_buffering off;
            proxy_cache off;
        }

        # WebSocket support for AI Omni Service
        location /api/ai/ws/ {
            # Strip /api/ai/ws/ prefix (was trailing-slash proxy_pass in static conf).
            rewrite ^/api/ai/ws/(.*)$ /$1 break;
            proxy_pass http://$svc_aiomni;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Proxy to Communications Service
        location /api/comms/ {
            limit_req zone=api_limit burst=20 nodelay;
            # Strip /api/comms/ prefix (was trailing-slash proxy_pass in static conf).
            rewrite ^/api/comms/(.*)$ /$1 break;
            proxy_pass http://$svc_comms;
        }

        # Proxy to Media Processing Service
        location /api/media {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep the /api/media prefix when forwarding to media processing service
            proxy_pass http://$svc_media;
            proxy_buffering off;
            proxy_cache off;

            # Add CORS headers for media requests
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        }

        # Proxy to History & Analytics Service (GET requests only)
        location /api/history/ {
            # Only allow GET requests to pass through to history-analytics-service
            # POST requests for saving history should go to conversation-service
            limit_req zone=api_limit burst=100 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$svc_history;
        }

        # Proxy POST requests for saving history to conversation-service
        location = /api/conversation/history/ {
            # Static version forwarded to conversation_service /history/ (trailing-URI strip).
            rewrite ^/api/conversation/history/(.*)$ /history/$1 break;
            proxy_pass http://$svc_conv;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proficiency metrics endpoints
        location /api/history/proficiency/ {
            # Increase rate limit for proficiency endpoints
            limit_req zone=api_limit burst=50 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Remove the /api/history prefix before forwarding to history service
            # NOTE: variable proxy_pass ignores any URI part — rewrite sets $uri.
            rewrite ^/api/history/(.*)$ /api/history/$1 break;
            proxy_pass http://$svc_history;
        }

        # Public user routes (with rate limiting for auth endpoints)
        location /api/users/register {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$svc_user/api/users/register;
        }

        location /api/users/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$svc_user/api/users/login;
        }

        location /api/users/google {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$svc_user/api/users/google;
        }

        location /api/users/verify {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$svc_user/api/users/verify;
        }

        location /api/users/logout {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$svc_user/api/users/logout;
        }

        location /api/users/token-migrate {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$svc_user/api/users/token-migrate;
        }

        # User service health check
        location /api/users/health {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://$svc_user/api/users/health;
        }

        # SSE endpoint for real-time notifications
        location /api/users/sse {
            proxy_pass http://$svc_user/api/users/sse;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            chunked_transfer_encoding on;
            add_header X-Accel-Buffering no always;
        }

        # Protected user routes (require authentication)
        location /api/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Forward to user service with full path preserved
            proxy_pass http://$svc_user;
        }

        # Stripe routes are hosted by user-service (see services/user-service/src/index.js,
        # `app.use('/api/stripe', stripeRoutes)`). Upstream responses can include many
        # Set-Cookie/Cache-Control/Stripe-* headers — use the larger global proxy buffers
        # configured at http{} scope; no override needed here.
        location /api/stripe/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://$svc_user;
        }

        # Proxy to Conversation Service for all conversation-related API requests
        location /api/conversation/ {
            # Increase rate limit for conversation endpoints to accommodate frequent updates
            limit_req zone=api_limit burst=100 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Remove the /api/conversation prefix before forwarding to conversation service
            # NOTE: variable proxy_pass ignores any URI part — the rewrite must
            # set the final $uri; proxy_pass must NOT carry a trailing URI.
            rewrite ^/api/conversation/(.*)$ /$1 break;
            proxy_pass http://$svc_conv;
        }

        # Proxy to AI Omni Service for all AI-related API requests
        location /api/ai/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Remove the /api/ai prefix before forwarding to AI service
            # NOTE: variable proxy_pass ignores any URI part — the rewrite must
            # set the final $uri; proxy_pass must NOT carry a trailing URI.
            rewrite ^/api/ai/(.*)$ /$1 break;
            proxy_pass http://$svc_aiomni;
        }

        # Root path - serve frontend application
        location / {
            proxy_pass http://$svc_client;
        }

        # Health check endpoint
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
