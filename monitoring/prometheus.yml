# Prometheus configuration for Oral AI Application

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:9090']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'comms-service'
    static_configs:
      - targets: ['comms-service:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'ai-omni-service'
    static_configs:
      - targets: ['ai-omni-service:8082']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'history-analytics-service'
    static_configs:
      - targets: ['history-analytics-service:3004']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'media-processing-service'
    static_configs:
      - targets: ['media-processing-service:3005']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 10s
    scrape_timeout: 5s