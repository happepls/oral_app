# AlertManager configuration for Oral AI Application

global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@oralai.com'
  smtp_auth_username: 'your-email@gmail.com'
  smtp_auth_password: 'your-password'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default-receiver'
  routes:
    - matchers:
        - severity="critical"
      receiver: 'critical-receiver'
      group_interval: 5m
      repeat_interval: 1h

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'admin@oralai.com'
        send_resolved: true

  - name: 'critical-receiver'
    email_configs:
      - to: 'admin@oralai.com,ops@oralai.com'
        send_resolved: true
    webhook_configs:
      - url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname']