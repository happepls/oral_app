<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <g transform="translate(100, 98)">
    <!-- Ear tufts (grow from body curve) -->
    <path d="M -14 -52 C -16 -62, -20 -66, -18 -68 C -16 -66, -10 -60, -6 -52" fill="#3D3B6E" />
    <path d="M 14 -52 C 16 -62, 20 -66, 18 -68 C 16 -66, 10 -60, 6 -52" fill="#3D3B6E" />

    <!-- Wings (round-ended, extend from body sides) -->
    <ellipse cx="-56" cy="10" rx="14" ry="22" fill="#3D3B6E" transform="rotate(-15 -56 10)" />
    <ellipse cx="56" cy="10" rx="14" ry="22" fill="#3D3B6E" transform="rotate(15 56 10)" />

    <!-- Body (near-circle, thick dark outline) -->
    <ellipse cx="0" cy="0" rx="50" ry="52" fill="#8B87C0" stroke="#3D3B6E" stroke-width="4" />

    <!-- Belly (lighter purple, lower half) -->
    <ellipse cx="0" cy="20" rx="28" ry="24" fill="#AAA7D0" />

    <!-- Eye rings (large peach) -->
    <circle cx="-17" cy="-12" r="20" fill="#E8B892" />
    <circle cx="17" cy="-12" r="20" fill="#E8B892" />

    <!-- Eye whites -->
    <circle cx="-17" cy="-12" r="15" fill="#FFFFFF" />
    <circle cx="17" cy="-12" r="15" fill="#FFFFFF" />

    <!-- Pupils (dark brown, offset inward+down) -->
    <circle cx="-14" cy="-9" r="8.5" fill="#3A2510" />
    <circle cx="20" cy="-9" r="8.5" fill="#3A2510" />

    <!-- Eye highlights (large + small) -->
    <circle cx="-10" cy="-13" r="3.5" fill="#FFFFFF" />
    <circle cx="24" cy="-13" r="3.5" fill="#FFFFFF" />
    <circle cx="-16" cy="-6" r="1.5" fill="#FFFFFF" />
    <circle cx="18" cy="-6" r="1.5" fill="#FFFFFF" />

    <!-- Beak (tiny, between eyes and belly) -->
    <path d="M -3.5 4 L 3.5 4 L 0 10 Z" fill="#D4944A" />

    <!-- Feet -->
    <g transform="translate(-12, 50)">
      <path d="M -3 0 L -6 5 M -3 0 L 0 6 M -3 0 L 3 4" stroke="#D4944A" stroke-width="2.8" stroke-linecap="round" fill="none" />
    </g>
    <g transform="translate(12, 50)">
      <path d="M 3 0 L 6 5 M 3 0 L 0 6 M 3 0 L -3 4" stroke="#D4944A" stroke-width="2.8" stroke-linecap="round" fill="none" />
    </g>
  </g>
</svg>
