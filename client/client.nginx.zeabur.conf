worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Zeabur 私有网络 CoreDNS — 运行时动态解析 .zeabur.internal
    # `.zeabur.internal` hostnames are resolved at request time (not at startup)
    # via this resolver + variable-based proxy_pass below. This tolerates the
    # api-gateway being temporarily unreachable and does not block nginx startup,
    # avoiding the `[emerg] host not found in upstream` crash on rolling deploys.
    resolver 10.43.0.20 valid=10s ipv6=off;
    resolver_timeout 5s;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Write temp files to /tmp so nginx can run as non-root
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer"';

    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 5001;
        server_name _;
        # Cloudflare-only origin host guard: drop forged Host / direct-IP scans.
        # `if` + `return` is in nginx's officially-safe "if is evil" allowlist.
        # Trailing `|` in the group allows an EMPTY Host so Docker/Zeabur internal
        # health probes (which often send no Host header) still reach /health;
        # only a present-but-unrecognized Host (public IP, forged) gets 444.
        if ($host !~* ^(guajiguaji\.top|www\.guajiguaji\.top|localhost|)$) { return 444; }
        root /usr/share/nginx/html;
        index index.html;

        # Backend api-gateway as a variable — forces per-request DNS resolution
        # through the http{} `resolver` above (instead of static startup lookup).
        set $apigw api-gateway.zeabur.internal:80;

        # --- Content-Security-Policy (server-level default; inherited only by
        # locations WITHOUT their own add_header. nginx add_header is
        # replace-not-merge per location, so /static/ and /health re-declare
        # this CSP verbatim below — keep all copies in sync). ---
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://embed.tawk.to https://*.tawk.to https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.tawk.to https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss: https://*.tawk.to wss://*.tawk.to https://accounts.google.com; frame-src https://*.tawk.to https://accounts.google.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

        # --- Static assets with content-hash: long cache ---
        location /static/ {
            expires 1y;
            # add_header is replace-not-merge: re-declare BOTH Cache-Control
            # AND the server-level CSP (else this location drops the CSP).
            add_header Cache-Control "public, immutable";
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://embed.tawk.to https://*.tawk.to https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.tawk.to https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss: https://*.tawk.to wss://*.tawk.to https://accounts.google.com; frame-src https://*.tawk.to https://accounts.google.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        }

        # --- WebSocket proxy (must precede /api) ---
        location /api/ws {
            proxy_pass http://$apigw;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_cache off;
        }

        # --- API proxy ---
        location /api {
            proxy_pass http://$apigw;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # NOTE: do NOT send `Connection: upgrade` for non-WebSocket /api/*
            # requests. The hard-coded value caused intermediate gateways to
            # close the upstream socket mid-stream on `/api/media/proxy` (the
            # COS audio passthrough used by AI auto-play), returning 500. WS
            # upgrades use the dedicated `/api/ws` block above.
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            # Stream binary bodies through without buffering (matches
            # api-gateway's `/api/media` block downstream).
            proxy_buffering off;
            proxy_cache off;
        }

        # --- SPA fallback ---
        location / {
            try_files $uri $uri/ /index.html;
            # No other add_header here, so server-level CSP would inherit; kept
            # explicit + in sync for clarity (serves index.html SPA entrypoint).
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://embed.tawk.to https://*.tawk.to https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.tawk.to https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss: https://*.tawk.to wss://*.tawk.to https://accounts.google.com; frame-src https://*.tawk.to https://accounts.google.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        }

        # --- Health check ---
        location /health {
            access_log off;
            return 200 "healthy\n";
            # add_header is replace-not-merge: re-declare BOTH Content-Type
            # AND the server-level CSP.
            add_header Content-Type text/plain;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://embed.tawk.to https://*.tawk.to https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.tawk.to https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss: https://*.tawk.to wss://*.tawk.to https://accounts.google.com; frame-src https://*.tawk.to https://accounts.google.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        }
    }
}
